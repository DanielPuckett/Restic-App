services:
  restic-tui:
    build: .
    container_name: restic-tui
    stdin_open: true
    tty: true
    privileged: true
    volumes:
      - /mnt/restic_tui:/mnt/restic_tui
      - /home/user/restic_tui:/home/user/restic_tui
      - /home/user/.ssh:/home/user/.ssh:ro
    environment:
      - TERM=xterm-256color
